<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditingFlow | Premium Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --neon-blue: #00eeff;
            --dark-bg: #050505;
            --glass-white: rgba(255, 255, 255, 0.03);
        }

        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .top-credit-bar {
            background: linear-gradient(90deg, transparent, rgba(0, 238, 255, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--neon-blue);
        }

        .glass { 
            background: var(--glass-white); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flow-text { 
            background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 15px rgba(0, 238, 255, 0.3));
        }

        .category-btn { cursor: pointer; position: relative; overflow: hidden; }
        .category-btn:hover { 
            border-color: var(--neon-blue); 
            background: rgba(0, 238, 255, 0.03);
            transform: translateY(-8px);
        }

        .plugin-card { 
            cursor: pointer; 
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .plugin-card:hover { 
            border-color: var(--neon-blue); 
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-5px);
        }

        .plugin-title { font-size: 1.2rem; font-weight: 800; color: #fff; text-transform: uppercase; }

        .search-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 238, 255, 0.15);
        }

        .free-badge {
            font-size: 11px;
            font-weight: 900;
            color: #000;
            background: var(--neon-blue);
            padding: 4px 12px;
            border-radius: 6px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 238, 255, 0.4);
        }

        /* BIGGER PASSWORD TEXT */
        .password-tag {
            font-size: 12px;
            font-weight: 800;
            color: var(--neon-blue);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-shadow: 0 0 10px rgba(0, 238, 255, 0.2);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="top-credit-bar">
        Official Distribution & Verified Assets by YoungTV
    </div>

    <div class="max-w-6xl mx-auto px-6 pt-16 pb-24 min-h-screen flex flex-col">
        <header class="text-center mb-24">
            <h1 class="text-7xl md:text-9xl font-black flow-text tracking-tighter uppercase mb-2">EditingFlow</h1>
            <p class="text-zinc-500 text-xs tracking-[0.4em] font-bold uppercase">Premium Digital Assets</p>
        </header>

        <main class="flex-grow">
            <div id="main-menu" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div onclick="showPlugins()" class="category-btn glass p-16 rounded-[48px] flex flex-col items-center justify-center text-center">
                    <span class="text-5xl mb-6">📁</span>
                    <h2 class="text-4xl font-extrabold uppercase tracking-tight mb-2">Plugins</h2>
                    <p class="text-zinc-500 text-sm font-semibold uppercase tracking-wide">27 Premium Assets</p>
                </div>
                <div class="glass p-16 rounded-[48px] flex flex-col items-center justify-center text-center opacity-40 cursor-not-allowed">
                    <span class="text-5xl mb-6">💻</span>
                    <h2 class="text-4xl font-extrabold uppercase tracking-tight">Apps</h2>
                    <p class="text-cyan-500 text-[10px] font-black border border-cyan-500/30 px-3 py-1 rounded-full uppercase tracking-widest mt-4">Coming Soon</p>
                </div>
            </div>

            <div id="plugins-view" class="hidden">
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-16 gap-8">
                    <button onclick="showMenu()" class="flex items-center gap-3 text-zinc-500 hover:text-white transition-all uppercase text-xs font-bold tracking-widest">
                        ← Return Home
                    </button>
                    <input type="text" id="pluginSearch" onkeyup="filterPlugins()" placeholder="Search library..." 
                           class="search-input w-full md:w-96 px-8 py-5 rounded-3xl font-bold text-sm">
                </div>
                <div id="pluginContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </main>

        <footer class="mt-24 pt-12 border-t border-white/5 text-center">
            <p class="text-zinc-500 text-[11px] font-bold tracking-[0.2em] uppercase">
                © 2026 EditingFlow • Verified Distribution by <span class="text-white">YoungTV</span>
            </p>
        </footer>
    </div>

    <script>
        const assets = [
            "BCC.2024.EditingFlow", "AfterCodecs.v1.7.2.EditingFlow", "Bokeh.Win.EditingFlow", 
            "BorisFX.Mocha.Pro.EditingFlow", "ClearPlus", "Deep.Glow.2.1.0.2.EditingFlow", 
            "Deep.Glow.V1.Win.EditingFlow", "Element.3D.WIN.EditingFlow", "EZCO-CRT-EMULATOR.EditingFlow", 
            "Flow.1.4.2.EditingFlow", "Flow.v1.5.2.EditingFlow", "FXConsole_1.0.5_Installer_x64.EditingFlow", 
            "Influx.v1.3.0.EditingFlow", "Instant.4K.EditingFlow", "Magic.Bullet.Looks.2024.EditingFlow", 
            "Omino.EditingFlow", "OpticalFlares.EditingFlow", "Pro.Shaders.EditingFlow", 
            "RSMB.Pro.EditingFlow", "Saber.EditingFlow", "Sapphire.2024.EditingFlow", 
            "Signal.EditingFlow", "Trapcode.Suite.2024.EditingFlow", "Twixtor.EditingFlow", 
            "Twitch.EditingFlow", "universe.EditingFlow", "VFX.Suite.EditingFlow"
        ];

        function renderCards(filter = "") {
            const container = document.getElementById('pluginContainer');
            const filteredAssets = assets.filter(name => name.toLowerCase().includes(filter.toLowerCase()));

            container.innerHTML = filteredAssets.map((name) => {
                const displayName = name.replace(/\./g, ' ').replace('EditingFlow', '').trim();
                const downloadUrl = `https://github.com/EditingFlow2/ae-presets/releases/download/v1.0/${name}.zip`;
                
                return `
                <div onclick="window.location.href='${downloadUrl}'" class="glass p-10 rounded-[32px] plugin-card group">
                    <div class="flex items-start justify-between mb-8">
                        <h3 class="plugin-title group-hover:text-cyan-400 transition-colors">${displayName}</h3>
                        <span class="free-badge">FREE</span>
                    </div>
                    <div class="flex flex-col">
                        <p class="text-zinc-600 text-[10px] font-extrabold uppercase tracking-widest italic">YoungTV Official</p>
                        <p class="password-tag">PASSWORD: youngtv</p>
                    </div>
                </div>
                `;
            }).join('');
        }

        function filterPlugins() { renderCards(document.getElementById('pluginSearch').value); }
        function showPlugins() { 
            document.getElementById('main-menu').classList.add('hidden'); 
            document.getElementById('plugins-view').classList.remove('hidden'); 
            renderCards(); 
        }
        function showMenu() { 
            document.getElementById('plugins-view').classList.add('hidden'); 
            document.getElementById('main-menu').classList.remove('hidden'); 
        }
        renderCards();
    </script>
</body>
</html>
