<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditingFlow | Creator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --neon-blue: #00eeff;
            --dark-bg: #050505;
        }

        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flow-text { 
            background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .portal-card { cursor: pointer; position: relative; }
        .portal-card:hover { 
            border-color: var(--neon-blue); 
            background: rgba(0, 238, 255, 0.05);
            transform: translateY(-12px);
        }

        .icon-circle {
            width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05); border-radius: 24px; font-size: 2.5rem;
            margin-bottom: 2rem; color: var(--neon-blue); transition: 0.4s;
        }

        .portal-card:hover .icon-circle { background: var(--neon-blue); color: #000; transform: rotate(10deg); }

        /* Credits bar - Hidden by default */
        #credit-bar {
            background: linear-gradient(90deg, transparent, rgba(0, 238, 255, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0; text-align: center; font-size: 10px; font-weight: 700;
            letter-spacing: 0.3em; text-transform: uppercase; color: var(--neon-blue);
        }

        .search-input { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .hidden { display: none !important; }
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="credit-bar" class="hidden">Official Distribution & Verified Assets by YoungTV</div>

    <div class="max-w-7xl mx-auto px-6 py-20 min-h-screen flex flex-col">
        
        <header class="text-center mb-24">
            <h1 class="text-6xl md:text-8xl font-black flow-text tracking-tighter uppercase mb-4">EditingFlow</h1>
            <p id="sub-header" class="text-zinc-500 text-xs tracking-[0.5em] font-bold uppercase">Universal Asset Hub</p>
        </header>

        <main class="flex-grow">
