<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditingFlow | Creator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --neon-blue: #00eeff;
            --dark-bg: #050505;
            --glass-white: rgba(255, 255, 255, 0.03);
        }

        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .top-credit-bar {
            background: linear-gradient(90deg, transparent, rgba(0, 238, 255, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--neon-blue);
        }

        .glass { 
            background: var(--glass-white); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flow-text { 
            background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 15px rgba(0, 238, 255, 0.3));
        }

        .portal-card { cursor: pointer; overflow: hidden; position: relative; }
        .portal-card:hover { 
            border-color: var(--neon-blue); 
            background: rgba(0, 238, 255, 0.05);
            transform: translateY(-10px);
        }

        /* Image Containers for Portals */
        .portal-image-box {
            width: 110px;
            height: 110px;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
            transition: all 0.5s ease;
        }
        .portal-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
