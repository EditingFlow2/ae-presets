<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditingFlow | Premium Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --neon-blue: #00eeff;
            --dark-bg: #050505;
            --glass-white: rgba(255, 255, 255, 0.03);
        }

        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Top Credit Bar - Sleeker Animation */
        .top-credit-bar {
            background: linear-gradient(90deg, transparent, rgba(0, 238, 255, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--neon-blue);
        }

        .glass { 
            background: var(--glass-white); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flow-text { 
            background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 15px rgba(0, 238, 255, 0.3));
        }

        /* Category Buttons */
        .category-btn { cursor: pointer; position: relative; overflow: hidden; }
        .category-btn:hover { 
            border-color: var(--neon-blue); 
            background: rgba(0, 238, 255, 0.03);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Modern Plugin Card */
        .plugin-card { 
            cursor: pointer; 
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .plugin-card:hover { 
            border-color: rgba(0, 238, 255, 0.5); 
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-5px);
        }
        .plugin-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            box-shadow: 0 0 20px rgba(0, 238, 255, 0);
            transition: 0.3s;
        }
        .plugin-card:hover::after { box-shadow: 0 0 30px rgba(0, 238, 255, 0.1); }

        .plugin-title { font-size: 1.15rem; font-weight: 800; color: #fff; text-transform: uppercase; }

        /* Search Bar Refinement */
        .search-container { position: relative; }
        .search-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 30px rgba(0, 238, 255, 0.15);
            width: 100%;
        }

        .free-badge {
            font-size: 10px;
            font-weight: 900;
            color: var(--neon-blue);
            background: rgba(0, 238, 255, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            letter-spacing: 1px;
        }

        .password-tag {
            font-size: 9px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        .hidden { display: none !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-blue); }
    </style>
</head>
<body>

    <div class="top-credit-bar">
        Official Distribution & Verified Assets by YoungTV
    </div>

    <div class="max-w-6xl mx-auto px-6 pt-16 pb-24 min-h-screen flex flex-col">
        <header class="text-center mb-24">
            <h1 class="text-7xl md:text-9xl font-black flow-text tracking-tighter uppercase mb-2">EditingFlow</h1>
            <div class="flex items-center justify-center gap-4">
                <span class="h-[1px] w-12 bg-zinc-800"></span>
                <p class="text-zinc-500 text-xs tracking-[0.4em] font-bold uppercase">Premium Digital Assets</p>
                <span class="h-[1px] w-12 bg-zinc-800"></span>
            </div>
        </header>

        <main class="flex-grow">
            <div id="main-menu" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div onclick="showPlugins()" class="category-btn glass p-16 rounded-[48px] flex flex-col items-center justify-center text-center group">
                    <div class="w-20 h-20 mb-8 rounded-3xl bg-white/5 flex items-center justify-center group-hover:bg-cyan-500/10 transition-colors">
                        <span class="text-4xl">📁</span>
                    </div>
                    <h2 class="text-4xl font-extrabold uppercase tracking-tight mb-2">Plugins</h2>
                    <p class="text-zinc-500 text-sm font-semibold tracking-wide uppercase">27 Premium Assets</p>
                </div>

                <div class="glass p-16 rounded-[48px] flex flex-col items-center justify-center text-center opacity-40 cursor-not-allowed">
                    <div class="w-20 h-20 mb-8 rounded-3xl bg-white/5 flex items-center justify-center">
                        <span class="text-4xl">💻</span>
                    </div>
                    <h2 class="text-4xl font-extrabold uppercase tracking-tight mb-2">Apps</h2>
                    <p class="text-cyan-500 text-[10px] font-black border border-cyan-500/30 px-3 py-1 rounded-full uppercase tracking-widest">Coming Soon</p>
                </div>
            </div>

            <div id="plugins-view" class="hidden">
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-16 gap-8">
                    <button onclick="showMenu()" class="group flex items-center gap-3 text-zinc-500 hover:text-white transition-all">
                        <span class="w-8 h-8 rounded-full border border-zinc-800 flex items-center justify-center group-hover:border-white">←</span>
                        <span class="text-xs font-bold uppercase tracking-widest">Return Home</span>
                    </button>
                    
                    <div class="search-container w-full md:w-96">
                        <input type="text" id="pluginSearch" onkeyup="filterPlugins()" placeholder="Search library..." 
                               class="search-input w-full px-8 py-5 rounded-3xl font-bold text-sm">
                    </div>
                </div>
                
                <div id="pluginContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </div>
        </main>

        <footer class="mt-24 pt-12 border-t border-white/5 text-center">
            <p class="text-zinc-500 text-[11px] font-bold tracking-[0.2em] uppercase">
                © 2026 EditingFlow • Verified Distribution by <span class="text-white">YoungTV</span>
            </p>
        </footer>
    </div>

    <script>
        const assets = [
            "BCC.2024.EditingFlow", "AfterCodecs.v1.7.2.EditingFlow", "Bokeh.Win.EditingFlow", 
            "BorisFX.Mocha.Pro.EditingFlow", "ClearPlus", "Deep.Glow.2.1.0.2.EditingFlow", 
            "Deep.Glow.V1.Win.EditingFlow", "Element.3D.WIN.EditingFlow", "EZCO-CRT-EMULATOR.EditingFlow", 
            "Flow.1.4.2.EditingFlow", "Flow.v1.5.2.EditingFlow", "FXConsole_1.0.5_Installer_x64.EditingFlow", 
            "Influx.v1.3.0.EditingFlow", "Instant.4K.EditingFlow", "Magic.Bullet.Looks.2024.EditingFlow", 
            "Omino.EditingFlow", "OpticalFlares.EditingFlow", "Pro.Shaders.EditingFlow", 
            "RSMB.Pro.EditingFlow", "Saber.EditingFlow", "Sapphire.2024.EditingFlow", 
            "Signal.EditingFlow", "Trapcode.Suite.2024.EditingFlow", "Twixtor.EditingFlow", 
            "Twitch.EditingFlow", "universe.EditingFlow", "VFX.Suite.EditingFlow"
        ];

        function renderCards(filter = "") {
            const container = document.getElementById('pluginContainer');
            const filteredAssets = assets.filter(name => 
                name.toLowerCase().includes(filter.toLowerCase())
            );

            container.innerHTML = filteredAssets.map((name, index) => {
                const displayName = name.replace(/\./g, ' ').replace('EditingFlow', '').trim();
                const downloadUrl = `https://github.com/EditingFlow2/ae-presets/releases/download/v1.0/${name}.zip`;
                
                return `
                <div onclick="window.location.href='${downloadUrl}'" 
                     class="glass p-10 rounded-[32px] plugin-card group"
                     style="animation: fadeIn 0.5s ease forwards ${index * 0.05}s; opacity: 0;">
                    <div>
                        <div class="flex items-start justify-between mb-6">
                            <h3 class="plugin-title group-hover:text-cyan-400 transition-colors">${displayName}</h3>
                            <div class="flex flex-col items-end shrink-0">
                                <span class="free-badge">FREE</span>
                                <span class="password-tag">PW: youngtv</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                            <p class="text-zinc-600 text-[9px] font-extrabold uppercase tracking-widest">YoungTV Certified</p>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function filterPlugins() {
            const query = document.getElementById('pluginSearch').value;
            renderCards(query);
        }

        function showPlugins() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('plugins-view').classList.remove('hidden');
            renderCards();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function showMenu() {
            document.getElementById('plugins-view').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        renderCards();
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

</body>
</html>
