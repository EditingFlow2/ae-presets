<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditingFlow | Universal Asset Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap');
        
        :root {
            --neon-blue: #00eeff;
            --dark-bg: #050505;
        }

        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .return-btn {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            letter-spacing: 2px;
            color: #888;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
            padding: 12px 24px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .return-btn:hover {
            color: var(--neon-blue);
            background: rgba(0, 238, 255, 0.08);
            border-color: var(--neon-blue);
            transform: translateX(-8px);
        }

        .flow-text { 
            background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 800;
        }

        /* Fixed Grid Layout */
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: 2rem;
            width: 100%;
        }

        @media (min-width: 768px) {
            .hub-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }

        .portal-card { 
            cursor: pointer; 
            position: relative; 
            border-radius: 48px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 3rem;
        }

        .portal-card:hover { 
            border-color: var(--neon-blue); 
            background: rgba(0, 238, 255, 0.05);
            transform: translateY(-10px);
        }

        .emoji-icon {
            font-size: 80px;
            line-height: 1;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(0, 238, 255, 0.2));
        }

        .status-tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #555;
            padding: 8px 24px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: auto;
        }

        #credit-bar {
            background: linear-gradient(90deg, transparent, rgba(0, 238, 255, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0; text-align: center; font-size: 10px; font-weight: 700;
            letter-spacing: 0.3em; text-transform: uppercase; color: var(--neon-blue);
            width: 100%;
        }

        .hidden { display: none !important; }
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="credit-bar" class="hidden">Verified Distribution & Assets by YoungTV</div>

    <div class="max-w-7xl mx-auto px-6 py-24 min-h-screen flex flex-col items-center">
        
        <header id="main-header" class="text-center mb-24">
            <h1 class="text-7xl md:text-8xl flow-text tracking-tighter uppercase mb-2">EditingFlow</h1>
            <p class="text-zinc-500 text-[10px] tracking-[0.6em] font-bold uppercase italic">Universal Asset Hub</p>
        </header>

        <main class="w-full flex-grow">
            <div id="main-hub" class="hub-grid animate-fade">
                
                <div onclick="showSection('editing')" class="portal-card glass">
                    <div class="emoji-icon">🎬</div>
                    <h2 class="text-3xl font-black uppercase tracking-tighter mb-2 leading-tight">Editing<br>Section</h2>
                    <p class="text-zinc-500 text-[11px] font-bold uppercase tracking-widest">Plugins & Presets</p>
                    <div class="status-tag" style="color: var(--neon-blue); border-color: var(--neon-blue);">Enter</div>
                </div>

                <div onclick="showSection('clips')" class="portal-card glass">
                    <div class="emoji-icon">🔫</div>
                    <h2 class="text-3xl font-black uppercase tracking-tighter mb-2 leading-tight">Blood<br>Strike</h2>
                    <p class="text-zinc-500 text-[11px] font-bold uppercase tracking-widest">Raw Clips & Montages</p>
                    <div class="status-tag">Coming Soon</div>
                </div>

                <div onclick="showSection('enhancer')" class="portal-card glass">
                    <div class="emoji-icon">💎</div>
                    <h2 class="text-3xl font-black uppercase tracking-tighter mb-2 leading-tight">Enhancer</h2>
                    <p class="text-zinc-500 text-[11px] font-bold uppercase tracking-widest leading-relaxed">AI Upscaling & Settings</p>
                    <div class="status-tag">Locked</div>
                </div>

            </div>

            <div id="editing-view" class="hidden animate-fade">
                <div class="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
                    <button onclick="showHub()" class="return-btn">
                        <span>←</span> RETURN
                    </button>
                    <input type="text" id="pluginSearch" onkeyup="filterPlugins()" placeholder="Search assets..." 
                           class="bg-white/5 border border-white/10 px-8 py-4 rounded-2xl w-full md:w-80 text-sm outline-none focus:border-cyan-400 transition-all">
                </div>
                <div id="pluginContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>
        </main>
    </div>

    <script>
        const assets = ["BCC 2024", "AfterCodecs", "Deep Glow", "Element 3D", "RSMB Pro", "Sapphire 2024", "Twixtor", "Universe", "VFX Suite"];

        function renderCards() {
            const container = document.getElementById('pluginContainer');
            container.innerHTML = assets.map(name => `
                <div class="glass p-10 rounded-[32px] portal-card group text-center border border-white/5 h-auto">
                    <h3 class="font-bold uppercase text-sm mb-4 group-hover:text-cyan-400 transition-colors">${name}</h3>
                    <p class="text-cyan-400 text-[11px] font-black tracking-widest">PASSWORD: youngtv</p>
                </div>
            `).join('');
        }

        function showSection(s) {
            if(s === 'editing') {
                document.getElementById('main-hub').classList.add('hidden');
                document.getElementById('main-header').classList.add('hidden');
                document.getElementById('editing-view').classList.remove('hidden');
                document.getElementById('credit-bar').classList.remove('hidden');
                renderCards();
            }
        }

        function showHub() {
            document.getElementById('editing-view').classList.add('hidden');
            document.getElementById('credit-bar').classList.add('hidden');
            document.getElementById('main-hub').classList.remove('hidden');
            document.getElementById('main-header').classList.remove('hidden');
        }
    </script>
</body>
</html>
